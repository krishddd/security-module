name: OWASP ASI Security CI/CD

# CI/CD for the OWASP ASI v3 security scanner.
#
# Three job groups:
#   1. lint-and-test  — runs on every push / PR. Fast (<2 min). Guards merges.
#   2. security-scan  — runs on workflow_dispatch and weekly cron. Scans a live
#                       agent endpoint, uploads SARIF / JUnit / HTML reports.
#   3. matrix-scan    — runs on workflow_dispatch only. Scans the two reference
#                       agents (AnythingLLM, Odysseus) in a parallel matrix when
#                       both are reachable in the runner network.
#
# To wire this into GitHub Actions, move this file to:
#     .github/workflows/security.yml
# at the PARENT of Security_module/ (its current location is a template).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      agent_url:
        description: "Base URL of the agent under test (e.g. https://agent.example.com)"
        required: true
      openapi_url:
        description: "Direct OpenAPI/Swagger spec URL (blank = probe well-known paths)"
        required: false
        default: ""
      auth_token_secret:
        description: "GitHub secret name holding the bearer token (blank = no auth)"
        required: false
        default: ""
      categories:
        description: "Comma-separated category filter (e.g. ASI01,ASI02). Blank = all 27."
        required: false
        default: ""
      use_llm:
        description: "Enable LLM planner + triage (requires OPENAI_API_KEY or ANTHROPIC_API_KEY)"
        required: false
        default: "false"
      max_llm_spend_usd:
        description: "Hard cap on LLM spend in USD"
        required: false
        default: "0.50"
      fingerprint:
        description: "Run passive agent fingerprinting before the scan"
        required: false
        default: "true"
      allow_internal:
        description: "Allow RFC1918 / loopback (only for self-hosted lab agents)"
        required: false
        default: "false"
  schedule:
    - cron: "0 2 * * 1"  # Weekly Monday 02:00 UTC

env:
  PYTHON_VERSION: "3.11"

# ----------------------------------------------------------------------------
# Jobs
# ----------------------------------------------------------------------------

jobs:

  # 1. Fast CI: lint + unit tests on every push and PR.
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: Security_module
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: Security_module
        run: pytest tests/ -q --ignore=tests/test_scan_v3_live.py

  # 2. On-demand / scheduled scan against a user-supplied agent endpoint.
  security-scan:
    name: OWASP ASI Live Scan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: Security_module
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve flags
        id: flags
        run: |
          ALLOW=""
          [ "${{ github.event.inputs.allow_internal }}" = "true" ] && ALLOW="--allow-internal"
          OPENAPI=""
          [ -n "${{ github.event.inputs.openapi_url }}" ] && OPENAPI="--openapi-url ${{ github.event.inputs.openapi_url }}"
          AUTH=""
          [ -n "${{ github.event.inputs.auth_token_secret }}" ] && AUTH="--auth-env ${{ github.event.inputs.auth_token_secret }}"
          FP=""
          [ "${{ github.event.inputs.fingerprint }}" = "true" ] && FP="--fingerprint"
          LLM=""
          [ "${{ github.event.inputs.use_llm }}" = "true" ] && LLM="--llm --max-llm-spend-usd ${{ github.event.inputs.max_llm_spend_usd }}"
          {
            echo "allow=$ALLOW"
            echo "openapi=$OPENAPI"
            echo "auth=$AUTH"
            echo "fp=$FP"
            echo "llm=$LLM"
          } >> $GITHUB_OUTPUT

      - name: Discover agent profile
        working-directory: Security_module
        env:
          AGENT_TOKEN: ${{ secrets[github.event.inputs.auth_token_secret] }}
        run: |
          python cli.py discover \
            --url "${{ github.event.inputs.agent_url }}" \
            ${{ steps.flags.outputs.openapi }} \
            ${{ steps.flags.outputs.auth }} \
            ${{ steps.flags.outputs.allow }} \
            --out profile.json

      - name: Build test plan
        working-directory: Security_module
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python cli.py plan --profile profile.json ${{ steps.flags.outputs.llm }} --out plan.json

      - name: Run scan-v3 (preflight + scan)
        id: scan
        working-directory: Security_module
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_TOKEN:       ${{ secrets[github.event.inputs.auth_token_secret] }}
        run: |
          CATS=""
          if [ -n "${{ github.event.inputs.categories }}" ]; then
            for c in $(echo "${{ github.event.inputs.categories }}" | tr ',' ' '); do
              CATS="$CATS --category $c"
            done
          fi
          python cli.py scan-v3 \
            --profile profile.json \
            --plan plan.json \
            --yes \
            ${{ steps.flags.outputs.allow }} \
            ${{ steps.flags.outputs.fp }} \
            ${{ steps.flags.outputs.llm }} \
            $CATS
        continue-on-error: true

      - name: Locate results directory
        id: results
        working-directory: Security_module
        run: |
          DIR=$(ls -td results/*/ 2>/dev/null | head -1 || true)
          [ -n "$DIR" ] && echo "dir=Security_module/${DIR%/}" >> $GITHUB_OUTPUT
          echo "Results: $DIR"

      - name: Upload SARIF to GitHub Code Scanning
        if: steps.results.outputs.dir != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.results.outputs.dir }}/report.sarif
          category: owasp-asi-v3

      - name: Publish JUnit test results
        if: steps.results.outputs.dir != '' && always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ${{ steps.results.outputs.dir }}/report.junit.xml
          check_name: "OWASP ASI v3 Security Tests"
          comment_title: "Security Assessment Results"

      - name: Upload report artifacts
        if: steps.results.outputs.dir != '' && always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-asi-v3-report-${{ github.run_number }}
          path: ${{ steps.results.outputs.dir }}
          retention-days: 90

      - name: Fail job on critical findings
        if: steps.scan.outcome == 'failure'
        run: |
          echo "Scan reported critical findings — job marked as failed."
          exit 1

  # 3. Matrix scan against both reference agents.
  #    Off by default — enable when the runner can reach the lab agents.
  matrix-scan:
    name: Reference Matrix (${{ matrix.agent }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.agent_url == 'matrix'
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        agent: [anythingllm, odysseus]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: Security_module
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run reference demo
        working-directory: Security_module
        env:
          ANYTHINGLLM_TOKEN: ${{ secrets.ANYTHINGLLM_TOKEN }}
          ODYSSEUS_TOKEN:    ${{ secrets.ODYSSEUS_TOKEN }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: |
          bash demo/run_${{ matrix.agent }}_demo.sh \
            --skip-docker-bootstrap \
            --use-llm \
            --max-llm-spend-usd 0.50

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-asi-v3-${{ matrix.agent }}-${{ github.run_number }}
          path: Security_module/results/
          retention-days: 30
